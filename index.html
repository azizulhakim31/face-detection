<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Detection</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        #video-container {
            position: relative;
            width: 720px;
            height: 540px;
        }

        #video,
        #video-container canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 720px;
            height: 540px;
            border: 5px solid black;
            z-index: 1;
        }

        #video-container canvas {
            z-index: 2;
            pointer-events: none;
        }
    </style>
</head>

<body>
    <!-- <h1>Detects your face & expressions</h1> -->
    <div id="video-container">
        <video id="video" autoplay muted></video>
    </div>

    <script defer src="face-api.min.js"></script>
    <script defer src="script.js"></script>
</body>

</html>
